# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2

      - name: Verify versions
        run: |
          echo "Node.js version: $(node --version)"
          echo "Bun version: $(bun --version)"
          # Ensure we're using the correct Node.js version
          if ! node --version | grep -q "v24"; then
            echo "ERROR: Expected Node.js v24.x.x but got $(node --version)"
            exit 1
          fi

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            functions/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'functions/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install functions dependencies
        run: cd functions && bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Check TypeScript
        run: bun run tsc:check

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Build application
        run: bun run build

      - name: Deploy Hosting to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEXUS_RPG_D04D1 }}
          channelId: live
          projectId: nexus-rpg-d04d1
      
      - name: Setup Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEXUS_RPG_D04D1 }}' > $HOME/gcloud-key.json
          
      - name: Cleanup Service Account
        if: always()
        run: |
          rm -f $HOME/gcloud-key.json
          rm -f ${{ github.workspace }}/gcloud-key.json
